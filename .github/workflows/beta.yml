name: PUBG Rangefinder Beta

run-name: pubg_rangefinder beta #${{ github.run_number }}

on:
  workflow_dispatch:

concurrency:
  group: pubg-rangefinder-beta-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PROJECT_NAME: pubg_rangefinder
  PROJECT_DIR: .
  BETA_TAG: pubg-rangefinder-beta
  BETA_BUILD_VERSION: v0.0.0-beta.${{ github.run_id }}.${{ github.run_attempt }}
  PACKAGE_NAME: pubg_rangefinder_windows_x64.zip

jobs:
  prepare_release:
    name: prepare-beta
    runs-on: ubuntu-latest
    steps:
      - name: Update moving beta tag and delete old beta release
        uses: actions/github-script@v7
        env:
          BETA_TAG: ${{ env.BETA_TAG }}
        with:
          script: |
            const tag = process.env.BETA_TAG || 'pubg-rangefinder-beta'
            const owner = context.repo.owner
            const repo = context.repo.repo

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` })
              await github.rest.git.updateRef({ owner, repo, ref: `tags/${tag}`, sha: context.sha, force: true })
            } catch (e) {
              if (e.status !== 404) throw e
              await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha: context.sha })
            }

            try {
              const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              await github.rest.repos.deleteRelease({ owner, repo, release_id: rel.data.id })
            } catch (e) {
              if (e.status !== 404) throw e
            }

      - name: Ensure beta release exists
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BETA_TAG }}
          name: ${{ env.BETA_TAG }}
          prerelease: true
          body: "Preparing pubg_rangefinder beta assets..."

  build_windows:
    name: build-windows-x64
    runs-on: windows-latest
    needs: prepare_release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 6 Widgets
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'

      - name: Configure MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        shell: pwsh
        run: |
          $qtPrefix = $env:QT_ROOT_DIR
          if ([string]::IsNullOrWhiteSpace($qtPrefix)) {
            throw "QT_ROOT_DIR is not available from install-qt-action."
          }
          cmake -S "${env:PROJECT_DIR}" -B "${env:PROJECT_DIR}/build" -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$qtPrefix"

      - name: Build
        shell: pwsh
        run: |
          cmake --build "${env:PROJECT_DIR}/build" --config Release

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $exePath = Join-Path $env:PROJECT_DIR "build/Release/pubg_rangefinder.exe"
          if (!(Test-Path $exePath)) {
            throw "Missing build output: $exePath"
          }
          $windeployqt = Get-ChildItem -Path $env:QT_ROOT_DIR -Recurse -Filter windeployqt.exe | Select-Object -First 1
          if ($null -eq $windeployqt) {
            throw "Failed to locate windeployqt.exe under QT_ROOT_DIR"
          }
          & $windeployqt.FullName --release --no-translations --no-opengl-sw $exePath

      - name: Package release asset
        shell: pwsh
        run: |
          $stageDir = Join-Path $env:PROJECT_DIR "dist/package"
          $releaseDir = Join-Path $env:PROJECT_DIR "build/Release"
          $zipPath = Join-Path $env:PROJECT_DIR "dist/${env:PACKAGE_NAME}"
          if (Test-Path $stageDir) {
            Remove-Item -Recurse -Force $stageDir
          }
          if (Test-Path $zipPath) {
            Remove-Item -Force $zipPath
          }
          New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
          Copy-Item -Path (Join-Path $releaseDir "*") -Destination $stageDir -Recurse
          Compress-Archive -Path (Join-Path $stageDir "*") -DestinationPath $zipPath
          echo "ASSET_PATH=$zipPath" >> $env:GITHUB_ENV

      - name: Upload beta asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BETA_TAG }}
          files: ${{ env.ASSET_PATH }}
          prerelease: true
          overwrite_files: true

  publish_release:
    name: publish-beta
    runs-on: ubuntu-latest
    needs: [prepare_release, build_windows]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Build"
            echo "- project: ${PROJECT_NAME}"
            echo "- version: ${BETA_BUILD_VERSION}"
            echo "- commit: $(git rev-parse --short=7 HEAD) ($(git rev-parse HEAD))"
            echo
            echo "## Notes"
            echo "- Stage 1 UI scaffold build"
            echo "- Asset is packaged as ${PACKAGE_NAME}"
            echo "- Qt runtime files are bundled via windeployqt"
          } > notes.md

      - name: Publish beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BETA_TAG }}
          name: ${{ env.BETA_TAG }}
          body_path: notes.md
          prerelease: true
